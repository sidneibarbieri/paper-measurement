  attack-pattern--60d0c01d-e2bf-49dd-a453-f8a9c9fa6f65:
    id: attack-pattern--60d0c01d-e2bf-49dd-a453-f8a9c9fa6f65
    name: Windows Remote Management
    description: 'Adversaries may use [Valid Accounts](https://attack.mitre.org/techniques/T1078)
      to interact with remote systems using Windows Remote Management (WinRM). The
      adversary may then perform actions as the logged-on user.


      WinRM is the name of both a Windows service and a protocol that allows a user
      to interact with a remote system (e.g., run an executable, modify the Registry,
      modify services).(Citation: Microsoft WinRM) It may be called with the `winrm`
      command or by any number of programs such as PowerShell.(Citation: Jacobsen
      2014) WinRM  can be used as a method of remotely interacting with [Windows Management
      Instrumentation](https://attack.mitre.org/techniques/T1047).(Citation: MSDN
      WMI)'
    tactic: lateral-movement
    technique_name: Windows Remote Management
    technique_id: T1021.006
    executors:
    - sh:
        platform: linux
        command: 'echo ''Simulated execution of T1021.006: Windows Remote Management'''
    - psh:
        platform: windows
        command: 'Write-Host ''Simulated execution of T1021.006: Windows Remote Management'''
    - sh:
        platform: darwin
        command: 'echo ''Simulated execution of T1021.006: Windows Remote Management'''
  attack-pattern--ae797531-3219-49a4-bccf-324ad7a4c7b2:
    id: attack-pattern--ae797531-3219-49a4-bccf-324ad7a4c7b2
    name: Web Services
    description: 'Adversaries may compromise access to third-party web services that
      can be used during targeting. A variety of popular websites exist for legitimate
      users to register for web-based services, such as GitHub, Twitter, Dropbox,
      Google, SendGrid, etc. Adversaries may try to take ownership of a legitimate
      user''s access to a web service and use that web service as infrastructure in
      support of cyber operations. Such web services can be abused during later stages
      of the adversary lifecycle, such as during Command and Control ([Web Service](https://attack.mitre.org/techniques/T1102)),
      [Exfiltration Over Web Service](https://attack.mitre.org/techniques/T1567),
      or [Phishing](https://attack.mitre.org/techniques/T1566).(Citation: Recorded
      Future Turla Infra 2020) Using common services, such as those offered by Google
      or Twitter, makes it easier for adversaries to hide in expected noise. By utilizing
      a web service, particularly when access is stolen from legitimate users, adversaries
      can make it difficult to physically tie back operations to them. Additionally,
      leveraging compromised web-based email services may allow adversaries to leverage
      the trust associated with legitimate domains.'
    tactic: resource-development
    technique_name: Web Services
    technique_id: T1584.006
    executors:
    - sh:
        platform: linux
        command: 'echo ''Simulated execution of T1584.006: Web Services'''
    - psh:
        platform: windows
