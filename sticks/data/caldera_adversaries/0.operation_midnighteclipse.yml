id: operation_midnighteclipse
name: 0.Operation MidnightEclipse
description: '[Operation MidnightEclipse](https://attack.mitre.org/campaigns/C0048)
  was a campaign conducted in March and April 2024 that involved initial exploit of
  zero-day vulnerability CVE-2024-3400, a critical command injection vulnerability
  in the GlobalProtect feature of Palo Alto Networks PAN-OS.(Citation: Volexity UPSTYLE
  2024)(Citation: Palo Alto MidnightEclipse APR 2024)


  Also known as: Operation MidnightEclipse'
objective: 495a9828-cab1-44dd-a0ca-66e58177d8cc
atomic_ordering:
