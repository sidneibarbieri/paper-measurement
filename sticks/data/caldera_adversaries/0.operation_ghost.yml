id: operation_ghost
name: 0.Operation Ghost
description: '[Operation Ghost](https://attack.mitre.org/campaigns/C0023) was an [APT29](https://attack.mitre.org/groups/G0016)
  campaign starting in 2013 that included operations against ministries of foreign
  affairs in Europe and the Washington, D.C. embassy of a European Union country.
  During [Operation Ghost](https://attack.mitre.org/campaigns/C0023), [APT29](https://attack.mitre.org/groups/G0016)
  used new families of malware and leveraged web services, steganography, and unique
  C2 infrastructure for each victim.(Citation: ESET Dukes October 2019)



  Also known as: Operation Ghost'
objective: 495a9828-cab1-44dd-a0ca-66e58177d8cc
